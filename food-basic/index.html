<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <title>Street Local — Street Vendor</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; width: 100%; background: #111; }
      body { display: flex; justify-content: center; align-items: center; overflow: hidden; }
      #app-shell {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        max-height: 100vh;
        position: relative;
        background: #0a0a0a;
        overflow-y: auto;
        overflow-x: hidden;
      }
      #app-bg {
        position: sticky;
        top: 0;
        width: 100%;
        height: 100vh;
        margin-bottom: -100vh;
        z-index: 0;
        pointer-events: none;
        background: url('https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20Apr%2030,%202026,%2004_47_24%20PM.png?updatedAt=1777542461928') center/cover no-repeat;
      }
      #root { width: 100%; padding-top: env(safe-area-inset-top, 0px); position: relative; z-index: 1; }
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { display: none; }
      @media (min-width: 481px) {
        #app-shell {
          border-left: 1px solid rgba(255,255,255,0.06);
          border-right: 1px solid rgba(255,255,255,0.06);
          box-shadow: 0 0 80px rgba(0,0,0,0.5);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <div id="app-bg"></div>
      <div id="root"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
