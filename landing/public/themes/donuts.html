<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Donuts — Saved Landing Theme</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* This file renders at the design's intrinsic 390x844 dimensions — NO
       internal scaling. Consumers (catalog preview, food-basic splash, etc.)
       are responsible for scaling the iframe ELEMENT from outside to fit
       their container. This is the canonical responsive-embed pattern. */
    html, body { margin: 0; padding: 0; width: 390px; height: 844px; background: #000; overflow: hidden; position: relative; }
    * { box-sizing: border-box; }
    #root { position: absolute; inset: 0; width: 390px; height: 844px; }
    .theme-frame {
      width: 390px !important;
      height: 844px !important;
      overflow: hidden !important;
      padding-top: 46px !important;
      padding-bottom: 8px !important;
      box-sizing: border-box !important;
      position: relative;
    }
  </style>
</head>
<body>
  <!-- Static bg image — fills the 390x844 design frame exactly. The src is
       set by inline script below so a ?bg= URL param can swap it (used by
       the catalog preview's variant thumbnails). -->
  <img id="bg-static" style="position:absolute;inset:0;width:390px;height:844px;object-fit:cover;z-index:0;pointer-events:none;" />
  <script>
    (function () {
      var DEFAULT_BG = 'https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20May%209,%202026,%2001_52_32%20PM.png?updatedAt=1778309567345'
      var bgParam = new URLSearchParams(window.location.search).get('bg')
      document.getElementById('bg-static').src = bgParam || DEFAULT_BG
    })()
  </script>
  <div id="root" style="z-index:1;"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>

          ]),
        ]),
      ])
    }

    createRoot(document.getElementById('root')).render(h(ThemeDonuts))
  </script>
</body>
</html>
