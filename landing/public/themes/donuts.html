<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Donuts — Saved Landing Theme</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; background: #000; }
    * { box-sizing: border-box; }
    /* Same min-h-screen clamp as the gallery so the layout fits a phone screen */
    .min-h-screen-clamp {
      min-height: 844px !important;
      max-height: 844px !important;
      height: 844px !important;
      overflow: hidden !important;
      padding-top: 46px !important;
      padding-bottom: 8px !important;
      box-sizing: border-box !important;
    }
  </style>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;">
  <!-- Static bg image (no scroll, no dim overlay — to match the gallery preview exactly) -->
  <div id="phone" style="width:390px;height:844px;position:relative;overflow:hidden;background:#000;border-radius:46px;box-shadow:0 18px 60px rgba(0,0,0,0.5);">
    <img id="bg-static" src="https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20May%209,%202026,%2001_52_32%20PM.png?updatedAt=1778309567345" style="position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:0;pointer-events:none;" />
    <div id="root" style="position:absolute;inset:0;z-index:1;width:390px;height:844px;"></div>
    <!-- iPhone notch / Dynamic Island -->
    <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:32px;background:#000;border-radius:22px;z-index:99;pointer-events:none;"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>

  <script type="module">
    import React from 'react'
    import { createRoot } from 'react-dom/client'

    const h = React.createElement

    // Read vendor-editable tokens from the URL query string so the saved
    // theme can be customised via Design Studio. Defaults preserve the
    // original donut design when no params are passed.
    const params = new URLSearchParams(window.location.search)
    const tokens = {
      accent:        params.get('accent')        || '#EC4899',
      shopName:      params.get('shopName')      || null,           // optional override
      kicker:        params.get('kicker')        || 'Hand-crafted Daily',
      headline1:     params.get('headline1')     || 'Sweet',
      headline2:     params.get('headline2')     || 'Glazed',
      headlineAcc:   params.get('headlineAcc')   || 'Donuts',
      sub:           params.get('sub')           || 'Hand-crafted donuts glazed and filled with love. Baked fresh every morning.',
      btnText:       params.get('btnText')       || 'Order Donuts',
      featuredKick:  params.get('featuredKick')  || 'Today’s Flavour',
      featuredName1: params.get('featuredName1') || 'Strawberry',
      featuredName2: params.get('featuredName2') || 'Glazed',
      pillText:      params.get('pillText')      || 'Open Now',
    }
    const accentBg   = tokens.accent
    const accentSoft = tokens.accent + '4D' // ~30% alpha
    const accentDim  = tokens.accent + '26' // ~15% alpha

    // ─── FROZEN SNAPSHOT — Donuts Theme (cloned from gallery Theme #6 on 2026-05-14) ──
    // Further edits to gallery Theme #6 will NOT affect this snapshot. Vendor
    // overrides flow in via URL params.
    function ThemeDonuts() {
      return h('div', { className: 'w-full overflow-hidden text-white min-h-screen-clamp' }, [
        h('div', { key: 'wrap', className: 'relative w-full h-full flex items-center justify-center px-6 py-3 overflow-hidden' }, [
          h('img', { key: 'f1', src: 'https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20May%2014,%202026,%2004_26_20%20AM.png', alt: '', className: 'absolute top-6 right-[-40px] w-52 h-52 rounded-full object-cover shadow-[0_40px_140px_rgba(236,72,153,0.4)] animate-bounce' }),
          h('img', { key: 'f2', src: 'https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20May%2014,%202026,%2004_30_51%20AM.png', alt: '', className: 'absolute bottom-0 left-[-40px] w-44 h-44 rounded-full object-cover shadow-[0_40px_140px_rgba(34,211,238,0.4)]' }),
          h('div', { key: 'c1', className: 'absolute top-[42%] left-[-20px] w-24 h-24 rounded-full bg-white/10 border border-white/10 backdrop-blur-2xl shadow-[0_20px_80px_rgba(255,255,255,0.08)]' }),
          h('div', { key: 'c2', className: 'absolute bottom-40 right-10 w-20 h-20 rounded-full bg-white/10 border border-white/10 backdrop-blur-2xl shadow-[0_20px_80px_rgba(255,255,255,0.08)]' }),
          h('div', { key: 'card', className: 'relative z-10 w-full max-w-[430px] min-h-[600px] rounded-[48px] border border-white/10 bg-white/5 backdrop-blur-3xl overflow-hidden shadow-[0_40px_140px_rgba(0,0,0,0.55)] p-6 flex flex-col justify-between' }, [
            h('div', { key: 'rad', className: 'absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(255,255,255,0.18),transparent_35%)]' }),
            h('div', { key: 'line', className: 'absolute top-0 left-10 w-[2px] h-full bg-gradient-to-b from-transparent via-white/10 to-transparent' }),
            h('div', { key: 'hdr', className: 'relative z-10 flex items-center justify-between' }, [
              h('div', { key: 'live', className: 'inline-flex items-center gap-2 px-3 py-1.5 rounded-full backdrop-blur-2xl', style: { background: accentBg, border: `1px solid ${accentSoft}`, boxShadow: `0 10px 40px ${accentSoft}` } }, [
                h('div', { key: 'dot', className: 'w-2 h-2 rounded-full bg-white animate-pulse' }),
                h('span', { key: 'l', className: 'text-[10px] font-semibold tracking-[0.2em] text-white uppercase' }, tokens.pillText),
              ]),
            ]),
            h('div', { key: 'hero', className: 'relative z-10 mt-3' }, [
              h('div', { key: 'kicker', className: 'text-white/40 text-xs tracking-[0.3em] uppercase mb-2 font-medium' }, tokens.kicker),
              h('div', { key: 'head-row', className: 'flex items-start gap-3 mb-2' }, [
                h('h1', { key: 'head', className: 'text-[44px] leading-[0.85] tracking-[-0.06em] font-black flex-1 min-w-0' }, [
                  tokens.headline1, h('br', { key: 'br' }), tokens.headline2,
                  h('span', { key: 'sp', className: 'block bg-clip-text text-transparent', style: { backgroundImage: `linear-gradient(to right, ${tokens.accent}, ${tokens.accent}cc)` } }, tokens.headlineAcc),
                ]),
                h('img', {
                  key: 'head-img',
                  src: 'https://ik.imagekit.io/nepgaxllc/Untitleddasddasdfssdfsdfsdsdasdss-removebg-preview.png',
                  alt: '',
                  className: 'w-24 h-24 object-contain flex-shrink-0 self-center',
                  style: { filter: `drop-shadow(0 8px 24px ${accentSoft})` },
                }),
              ]),
              h('p', { key: 'sub', className: 'text-white/55 text-sm leading-snug max-w-[310px]' },
                tokens.sub),
            ]),
            h('div', { key: 'feat', className: 'relative z-10 mt-3 rounded-[24px] border border-white/10 bg-black/20 backdrop-blur-3xl p-3 shadow-[0_30px_100px_rgba(0,0,0,0.35)] overflow-hidden' }, [
              h('div', { key: 'gl', className: 'absolute top-[-30px] right-[-20px] w-32 h-32 rounded-full blur-2xl', style: { background: accentDim } }),
              h('div', { key: 'row', className: 'flex items-center justify-between mb-3' }, [
                h('div', { key: 'txt' }, [
                  h('div', { key: 'k', className: 'text-white/40 text-[10px] uppercase tracking-[0.25em] mb-1' }, tokens.featuredKick),
                  h('div', { key: 't', className: 'text-2xl font-black tracking-tight leading-[0.95]' }, [
                    tokens.featuredName1,
                    h('span', { key: 's', className: 'block', style: { color: tokens.accent } }, tokens.featuredName2),
                  ]),
                ]),
                h('div', { key: 'orb', className: 'w-14 h-14 rounded-full flex items-center justify-center overflow-hidden', style: { background: `linear-gradient(135deg, ${tokens.accent}, ${tokens.accent}aa)`, boxShadow: `0 20px 80px ${accentSoft}` } },
                  h('img', { src: 'https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20May%2014,%202026,%2004_56_26%20AM.png', alt: '', className: 'w-full h-full object-cover' })
                ),
              ]),
              h('button', {
                key: 'cta',
                onClick: () => {
                  try { window.parent && window.parent.postMessage({ type: 'sl-theme-enter-menu' }, '*') } catch {}
                },
                className: 'w-full h-11 rounded-[20px] text-base font-black hover:scale-[1.03] transition-all duration-300',
                style: { background: `linear-gradient(to right, ${tokens.accent}, ${tokens.accent}cc)`, color: '#fff', boxShadow: `0 30px 100px ${accentSoft}` },
              }, tokens.btnText),
            ]),
            h('div', { key: 'metrics', className: 'relative z-10 grid grid-cols-3 gap-2 mt-3' }, [
              h('div', { key: 'm1', className: 'rounded-2xl bg-pink-500/15 border border-pink-400/30 backdrop-blur-2xl p-3 text-center' }, [
                h('div', { key: 'n', className: 'text-xl font-black text-yellow-400' }, '24K'),
                h('div', { key: 'l', className: 'text-[9px] text-white/55 mt-1 uppercase tracking-[0.2em]' }, 'Guests'),
              ]),
              h('div', { key: 'm2', className: 'rounded-2xl bg-pink-500/15 border border-pink-400/30 backdrop-blur-2xl p-3 text-center' }, [
                h('div', { key: 'n', className: 'text-xl font-black text-yellow-400' }, '5★'),
                h('div', { key: 'l', className: 'text-[9px] text-white/55 mt-1 uppercase tracking-[0.2em]' }, 'Rating'),
              ]),
              h('div', { key: 'm3', className: 'rounded-2xl bg-pink-500/15 border border-pink-400/30 backdrop-blur-2xl p-3 text-center' }, [
                h('div', { key: 'n', className: 'text-xl font-black text-yellow-400' }, '12m'),
                h('div', { key: 'l', className: 'text-[9px] text-white/55 mt-1 uppercase tracking-[0.2em]' }, 'Delivery'),
              ]),
            ]),
          ]),
        ]),
      ])
    }

    createRoot(document.getElementById('root')).render(h(ThemeDonuts))
  </script>
</body>
</html>
