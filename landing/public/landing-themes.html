    // ─── iPhone frame wrapper ─────────────────────────────────────────────
    // Renders any theme inside a realistic iPhone bezel + notch + side buttons.
    // `scale` controls the size: 1.0 = full phone, 0.55 = gallery thumb.
    //
    // IMPORTANT: the bezel sits AROUND the screen (not inside it). The screen
    // itself is the full W×H so the theme content (rendered at 390 wide)
    // isn't clipped on the right edge.
    function PhoneFrame({ children, scale = 1, bg = null, noOverlay = false, bgFit = 'cover' }) {
      const W = 390, H = 844         // screen dimensions
      const B = 9                    // bezel thickness around the screen
      // At scale === 1 we want the phone to FIT the user's actual viewport
      // (so the preview matches what they'd see on their real device). At 0.5
      // and 0.75 we keep the fixed proportional sizes for browsing.
      const [vw, setVw] = useState(typeof window !== 'undefined' ? window.innerWidth : 1200)
      const [vh, setVh] = useState(typeof window !== 'undefined' ? window.innerHeight : 800)
      useEffect(() => {
        const onResize = () => { setVw(window.innerWidth); setVh(window.innerHeight) }
        window.addEventListener('resize', onResize)
        return () => window.removeEventListener('resize', onResize)
      }, [])
      // Viewport-fit scale leaves a small margin for the top scale toggle + bezel.
      const fitScale = Math.min((vw - 24) / (W + B * 2), (vh - 120) / (H + B * 2))
      const effScale = scale === 1 ? Math.max(0.3, fitScale) : scale
      return h('div', {
        style: {
          width: (W + B * 2) * effScale,
          height: (H + B * 2) * effScale,
          position: 'relative', flexShrink: 0,
          background: '#1a1a1c',
          borderRadius: (54 + B) * effScale,
          // Outer drop shadow only — no inset ring, which was causing a
          // visible shade line below the notch area.

          padding: B * effScale,

          key: 'screen',
          className: 'phone-screen',
          style: {
            width: W * effScale,
            height: H * effScale,
            borderRadius: 46 * effScale,
            overflow: 'hidden',
            position: 'relative',
            background: '#000',
          },
        }, [
          // Static background image — pinned to the phone screen, does NOT scroll
          // with content. Only used by themes that pass a `bg` prop. Sits beneath
          // the scrolling content so the theme can layer overlays / cards on top.
          bg ? h('img', {
            key: 'bg-static',
            src: bg,
            alt: '',
            style: {
              position: 'absolute', inset: 0,
              width: '100%', height: '100%',
              objectFit: bgFit,
              objectPosition: 'center',
              zIndex: 0, pointerEvents: 'none',
            },
          }) : null,
          // Static dim overlay — tied directly to the bg image, also in the
          // static layer. Skipped when the theme registers noOverlay (e.g.
          // property-sales themes where the image IS the design and shouldn't

              zIndex: 0, pointerEvents: 'none',
            },
          }) : null,
          // Fixed-size theme container — NO scroll. Content that exceeds
          // 844px is clipped at the bottom of the phone screen, never
          // scrolled. This is deliberate: themes must be visually complete
          // within one screen.
          h('div', {
            key: 'scroll',
            className: 'phone-screen',
            style: {

              borderRadius: 22 * effScale,
              zIndex: 99,
              pointerEvents: 'none',
            },
          }),
        ]),
        // Side buttons — positioned relative to the frame, outside the bezel
        h('div', { key: 'btn-mute',   style: { position: 'absolute', left: -2 * effScale, top: 90  * effScale, width: 3 * effScale, height: 28 * effScale, background: '#2a2a2c', borderRadius: `${2*effScale}px 0 0 ${2*effScale}px` } }),
        h('div', { key: 'btn-vol-up', style: { position: 'absolute', left: -2 * effScale, top: 150 * effScale, width: 3 * effScale, height: 48 * effScale, background: '#2a2a2c', borderRadius: `${2*effScale}px 0 0 ${2*effScale}px` } }),
        h('div', { key: 'btn-vol-dn', style: { position: 'absolute', left: -2 * effScale, top: 210 * effScale, width: 3 * effScale, height: 48 * effScale, background: '#2a2a2c', borderRadius: `${2*effScale}px 0 0 ${2*effScale}px` } }),
        h('div', { key: 'btn-power',  style: { position: 'absolute', right: -2 * effScale, top: 170 * effScale, width: 3 * effScale, height: 72 * effScale, background: '#2a2a2c', borderRadius: `0 ${2*effScale}px ${2*effScale}px 0` } }),
      ])
    }

    // ─── Gallery + detail views ───────────────────────────────────────────
    function App() {
      const [selected, setSelected] = useState(null)
      const [scale, setScale] = useState(1.0) // detail-view scale

      if (selected) {
        const theme = THEMES.find(t => t.id === selected)
        return h('div', { className: 'min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center py-10 px-4' }, [
          h('div', { key: 'topbar', className: 'fixed top-4 left-4 z-50 flex items-center gap-2 flex-wrap' }, [
            h('button', {
              key: 'back', onClick: () => setSelected(null),
              className: 'px-4 py-2 rounded-full bg-white/10 backdrop-blur-md border border-white/15 text-sm font-bold flex items-center gap-2 hover:bg-white/20',
            }, ['←', ' Back to Gallery']),
            h('div', { key: 'tag', className: 'px-3 py-2 rounded-full bg-black/60 backdrop-blur border border-white/10 text-xs font-bold' },
              `Theme #${theme.id} — ${theme.name}`),
          ]),
          // Scale controls
          h('div', { key: 'scale', className: 'fixed top-4 right-4 z-50 flex items-center gap-1 bg-black/60 backdrop-blur border border-white/10 rounded-full p-1' },
            [0.5, 0.75, 1.0].map(s =>
              h('button', {
                key: s, onClick: () => setScale(s),
                className: `px-3 py-1.5 rounded-full text-xs font-bold transition ${scale === s ? 'bg-white text-black' : 'text-white/70 hover:text-white'}`,
              }, s === 1.0 ? '100%' : (s * 100) + '%')
            )
          ),
          h(PhoneFrame, { key: 'phone', scale, bg: theme.bg, noOverlay: theme.noOverlay, bgFit: theme.bgFit }, h(theme.render, {})),
        ])
      }

      return h('div', { className: 'min-h-screen px-6 py-10 max-w-6xl mx-auto' }, [
        h('header', { key: 'header', className: 'mb-10' }, [
          h('div', { key: 'kicker', className: 'text-xs font-black tracking-widest text-red-500 uppercase mb-2' }, 'StreetLocal · Vendor Design'),
          h('h1', { key: 'h', className: 'text-3xl md:text-4xl font-black mb-2' }, 'Landing Themes Gallery'),
          h('p', { key: 'sub', className: 'text-white/55 text-sm md:text-base max-w-2xl' },
            'Tap a theme to preview full-screen. Any vendor — food, products, services or anything else — can pick any theme. Choose for visual style, not category.'),
        ]),
        h('div', { key: 'grid', className: 'grid sm:grid-cols-2 lg:grid-cols-3 gap-6' },
          THEMES.map(t =>
            h('button', {
              key: t.id, onClick: () => setSelected(t.id),
              className: 'group text-left rounded-3xl bg-white/5 border border-white/10 hover:border-red-500/50 hover:bg-white/[0.08] transition overflow-hidden',
            }, [
              h('div', { key: 'thumb', className: 'relative flex items-start justify-center pt-6 pb-2 bg-black/40' },
                h(PhoneFrame, { scale: 0.55, bg: t.bg, noOverlay: t.noOverlay, bgFit: t.bgFit }, h(t.render, {}))
              ),
              h('div', { key: 'meta', className: 'p-4' }, [
                h('div', { key: 'r', className: 'flex items-baseline justify-between mb-1' }, [
                  h('div', { key: 'name', className: 'text-base font-black' }, `#${t.id} · ${t.name}`),
                  h('div', { key: 'arrow', className: 'text-red-500 group-hover:translate-x-1 transition' }, '→'),
                ]),
                h('div', { key: 'desc', className: 'text-xs text-white/55 leading-relaxed' }, t.desc),
              ]),
            ])
          )
        ),
        h('div', { key: 'footer', className: 'mt-10 p-5 rounded-2xl bg-white/5 border border-white/8 text-sm text-white/55 leading-relaxed' }, [
          h('div', { key: 't', className: 'text-white font-bold mb-1' }, 'How to add a new theme'),
          'Themes are intentionally category-agnostic — any vendor can pick any theme. Send another design and I\'ll add it as Theme #' + (THEMES.length + 1) + '. Once we have enough we\'ll decide which knobs become editable in Design Studio.',
        ]),
      ])
    }

    createRoot(document.getElementById('root')).render(h(App))
  </script>
</body>
</html>
