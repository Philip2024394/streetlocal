<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Street Local — Software for Local Business</title>
    <meta name="description" content="Software built for local businesses. Simple. Powerful. Mobile-first." />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; width: 100%; background: #f5f5f5; }
      body { display: flex; justify-content: center; overflow: hidden; }
      #app-shell {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        position: relative;
        background: #ffffff;
        overflow-y: auto;
        overflow-x: hidden;
      }
      #root { width: 100%; }
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { display: none; }
      @media (min-width: 481px) {
        #app-shell {
          border-left: 1px solid #e0e0e0;
          border-right: 1px solid #e0e0e0;
          box-shadow: 0 0 40px rgba(0,0,0,0.08);
        }
      }
      /* Landing routes (/, /theme, /donut) escape the 480px phone-frame
         shell — they're full-bleed marketing pages, not the admin app. */
      body.is-landing { display: block; overflow: visible; background: #fff; }
      body.is-landing #app-shell { max-width: none; height: auto; overflow: visible; border: none; box-shadow: none; }
      @media (min-width: 481px) {
        body.is-landing #app-shell { border: none; box-shadow: none; }
      }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <div id="root"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
