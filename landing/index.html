<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreetLocal — Premium PWA apps for local business · 0% commission</title>
    <meta name="description" content="StreetLocal builds premium mobile PWA apps for bakeries, restaurants, salons & retail. 0% commission, 15 payment gateways, multi-currency, 5-minute setup. Pricing from $19/mo." />
    <link rel="canonical" href="https://streetlocal.live/" />
    <meta name="theme-color" content="#FACC15" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp link preview) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://streetlocal.live/" />
    <meta property="og:title" content="StreetLocal — Premium PWA apps for local business" />
    <meta property="og:description" content="Premium mobile apps for bakeries, restaurants, salons & retail. 0% commission, 15 payment gateways, 5-minute setup." />
    <meta property="og:image" content="https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20May%206,%202026,%2002_50_47%20PM.png?updatedAt=1778053871353" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="StreetLocal" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StreetLocal — Premium PWA apps for local business" />
    <meta name="twitter:description" content="Premium mobile apps for bakeries, restaurants, salons & retail. 0% commission, 15 payment gateways." />
    <meta name="twitter:image" content="https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20May%206,%202026,%2002_50_47%20PM.png?updatedAt=1778053871353" />

    <!-- Structured data — Organization + SoftwareApplication. Drives
         Google's rich-result panel + brand knowledge graph. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://streetlocal.live/#org",
          "name": "StreetLocal",
          "url": "https://streetlocal.live/",
          "logo": "https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20May%206,%202026,%2002_50_47%20PM.png?updatedAt=1778053871353",
          "email": "streetlocallive@gmail.com",
          "areaServed": "Worldwide",
          "sameAs": []
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://streetlocal.live/#app",
          "name": "StreetLocal Platform",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web, iOS, Android (PWA)",
          "offers": [
            { "@type": "Offer", "name": "Starter", "price": "19", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Professional", "price": "49", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Enterprise", "price": "99", "priceCurrency": "USD" }
          ],
          "aggregateRating": null,
          "description": "Premium PWA platform for local businesses — bakeries, restaurants, salons, retail. 0% commission, 15 payment gateways, multi-currency, multi-language."
        }
      ]
    }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; width: 100%; background: #f5f5f5; }
      body { display: flex; justify-content: center; overflow: hidden; }
      #app-shell {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        position: relative;
        background: #ffffff;
        overflow-y: auto;
        overflow-x: hidden;
      }
      #root { width: 100%; }
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { display: none; }
      @media (min-width: 481px) {
        #app-shell {
          border-left: 1px solid #e0e0e0;
          border-right: 1px solid #e0e0e0;
          box-shadow: 0 0 40px rgba(0,0,0,0.08);
        }
      }
      /* Landing routes (/, /theme, /donut) escape the 480px phone-frame
         shell — they're full-bleed marketing pages, not the admin app. */
      body.is-landing { display: block; overflow: visible; background: #fff; }
      body.is-landing #app-shell { max-width: none; height: auto; overflow: visible; border: none; box-shadow: none; }
      @media (min-width: 481px) {
        body.is-landing #app-shell { border: none; box-shadow: none; }
      }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <div id="root"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
