<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <title>Services Local Chat</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; width: 100%; background: #0a0a0a; }
      body { display: flex; justify-content: center; align-items: center; overflow: hidden; }
      #app-shell {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        max-height: 100vh;
        position: relative;
        background: #1a0e05;
        overflow: hidden;
        transform: translateZ(0);
        contain: paint layout;
      }
      #app-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      #app-bg img {
        width: 100%;
        height: 100%;
        object-fit: fill;
      }
      #app-glass {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        background: rgba(0,0,0,0.45);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      #root { width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden; padding-top: env(safe-area-inset-top, 0px); position: relative; z-index: 1; }
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { display: none; }
      @keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
      @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 8px rgba(255,0,0,0.6), 0 0 16px rgba(255,0,0,0.3); } 50% { box-shadow: 0 0 16px rgba(255,0,0,0.9), 0 0 32px rgba(255,0,0,0.5), 0 0 48px rgba(255,0,0,0.2); } }
      @media (min-width: 481px) {
        #app-shell {
          border-left: 1px solid rgba(255,255,255,0.06);
          border-right: 1px solid rgba(255,255,255,0.06);
          box-shadow: 0 0 80px rgba(0,0,0,0.5);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <div id="app-bg"><img id="app-bg-img" src="https://fjvafjkzvygkhiwjuvla.supabase.co/storage/v1/object/public/assets/chatgpt-image-may-6-2026-01_19_01-pm.png" alt="" /></div>
      <div id="app-glass"></div>
      <div id="root"></div>
    </div>
    <script>
      // Clear stale defaults
      var oldFoodType = localStorage.getItem('serviceslocalchat_shopFoodType');
      if (oldFoodType && oldFoodType.includes('&')) localStorage.removeItem('serviceslocalchat_shopFoodType');
      // Background: URL param takes priority, then localStorage
      var params = new URLSearchParams(window.location.search);
      var isDemo = params.get('demo') === 'true';
      var bgParam = params.get('bg');
      var bgImg = document.getElementById('app-bg-img');
      if (bgParam && bgImg) {
        // Explicit bg param — always wins (used by theme preview iframes)
        bgImg.src = decodeURIComponent(bgParam);
        bgImg.style.objectFit = 'fill';
      } else if (isDemo && !params.get('theme') && bgImg) {
        // Demo mode with no theme param — default noodle
        bgImg.src = 'https://fjvafjkzvygkhiwjuvla.supabase.co/storage/v1/object/public/assets/chatgpt-image-may-7-2026-09_41_03-am.png';
      } else if (!isDemo && !params.get('preview')) {
        // Normal mode — load from localStorage (skip in preview mode)
        var savedBg = localStorage.getItem('serviceslocalchat_themeBg');
        if (savedBg && bgImg) bgImg.src = savedBg;
      }
      // Apply saved background position for custom themes (skip in preview mode)
      var savedTheme = localStorage.getItem('serviceslocalchat_theme');
      var savedPos = localStorage.getItem('serviceslocalchat_bgPos');
      if (savedTheme === 'custom' && savedPos && !params.get('preview')) {
        try {
          var pos = JSON.parse(savedPos);
          var bgEl = document.getElementById('app-bg-img');
          if (bgEl) {
            bgEl.style.objectFit = 'cover';
            bgEl.style.objectPosition = pos.x + '% ' + pos.y + '%';
          }
        } catch(e) {}
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
